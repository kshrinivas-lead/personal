<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Handwritten S monogram. The full name is unreadable at 16px, which is the
       size that actually matters in a browser tab; a single stroked letter is
       not. Paper ground so the mark holds on both light and dark tab bars. -->
  <rect width="64" height="64" rx="12" fill="#fbfaf8"/>
  <path
    d="M45 19c-2.5-5.5-9-7.5-15-5.5-5.5 1.8-8 7.5-4.5 11.5 3 3.4 9 4.2 13 7.2 4.5 3.4 4.8 9.8 0 13.2-5 3.5-13 2.6-16.5-2.4"
    fill="none"
    stroke="#16150f"
    stroke-width="5.5"
    stroke-linecap="round"
  />
</svg>
